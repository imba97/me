[build]
command = "pnpm build"

[build.environment]
NODE_VERSION = "25"
SECRETS_SCAN_ENABLED = "true"
SECRETS_SCAN_OMIT_PATHS = ".nuxt/**,.output/**,node_modules/**,dist/**,public/_nuxt/**"
SECRETS_SCAN_OMIT_KEYS = "NAVIDROME_API_URL,NAVIDROME_USERNAME,NAVIDROME_PASSWORD,STEAM_ID,STEAM_API_KEY,AI_API_URL,AI_API_KEY,GITHUB_ACCESS_TOKEN"
